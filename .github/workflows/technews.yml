name: 发送邮件
on:
  workflow_dispatch:
    inputs:
      test_recipient:
        description: '测试收件邮箱；留空则按 Notion 订阅列表发送'
        required: false
        type: string
  schedule:
    - cron: '30 23 * * *'  # 每天上海时间07:30执行（前一天UTC 23:30）

permissions:
  contents: read

jobs:
  setup-and-test:
    runs-on: ubuntu-latest  # 使用 Ubuntu 环境

    steps:
      - name: 检出代码库
        uses: actions/checkout@v5
        with:
          persist-credentials: true  # 确保能够推送更改

      - name: 设置 Git
        run: |
          git config user.name "NowScott"
          git config user.email "nowscott@qq.com"

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 设置环境变量并运行 main.py
        env:
          SENDING_ACCOUNT: ${{ secrets.SENDING_ACCOUNT }}
          SENDING_PASSWORD: ${{ secrets.SENDING_PASSWORD }}
          SERVER: ${{ secrets.SERVER }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TEST_RECIPIENT: ${{ inputs.test_recipient }}
        run: |
          python src/main.py
