name: 发送邮件
on:
  workflow_dispatch:
    inputs:
      test_recipient:
        description: '测试收件邮箱；留空则按 Notion 订阅列表发送'
        required: false
        type: string
  schedule:
    - cron: '30 6 * * *'
      timezone: 'Asia/Shanghai'
    - cron: '45 6 * * *'
      timezone: 'Asia/Shanghai'
    - cron: '0 7 * * *'
      timezone: 'Asia/Shanghai'

permissions:
  contents: read

concurrency:
  group: newsletter-delivery
  cancel-in-progress: false

jobs:
  setup-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 计算发送日期
        id: delivery
        run: |
          DELIVERY_DATE=$(TZ=Asia/Shanghai date '+%Y-%m-%d')
          echo "delivery_date=$DELIVERY_DATE" >> "$GITHUB_OUTPUT"

      - name: 检查当日发送标记
        if: github.event_name == 'schedule'
        id: delivery_cache
        uses: actions/cache/restore@v5
        with:
          path: .newsletter-delivery-marker
          key: newsletter-delivery-${{ steps.delivery.outputs.delivery_date }}

      - name: 跳过当日重复任务
        if: github.event_name == 'schedule' && steps.delivery_cache.outputs.cache-hit == 'true'
        run: |
          echo "当日邮件已由更早的任务发送，本次跳过"

      - name: 检出代码库
        if: github.event_name != 'schedule' || steps.delivery_cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: 设置 Python
        if: github.event_name != 'schedule' || steps.delivery_cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: 输出任务信息
        if: github.event_name != 'schedule' || steps.delivery_cache.outputs.cache-hit != 'true'
        run: |
          echo "触发方式: $GITHUB_EVENT_NAME"
          echo "UTC 时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "上海时间: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: 安装 Python 依赖
        if: github.event_name != 'schedule' || steps.delivery_cache.outputs.cache-hit != 'true'
        run: |
          pip install -r requirements.txt

      - name: 安全加载测试收件人
        if: github.event_name != 'schedule' || steps.delivery_cache.outputs.cache-hit != 'true'
        run: |
          TEST_RECIPIENT=$(jq -r '.inputs.test_recipient // ""' "$GITHUB_EVENT_PATH")
          if [[ "$TEST_RECIPIENT" == *$'\n'* || "$TEST_RECIPIENT" == *$'\r'* ]]; then
            echo "测试收件人格式无效"
            exit 1
          fi
          if [ -n "$TEST_RECIPIENT" ]; then
            echo "::add-mask::$TEST_RECIPIENT"
          fi
          echo "TEST_RECIPIENT=$TEST_RECIPIENT" >> "$GITHUB_ENV"

      - name: 设置环境变量并运行 main.py
        id: send_newsletter
        if: github.event_name != 'schedule' || steps.delivery_cache.outputs.cache-hit != 'true'
        env:
          PYTHONUNBUFFERED: '1'
          SENDING_ACCOUNT: ${{ secrets.SENDING_ACCOUNT }}
          SENDING_PASSWORD: ${{ secrets.SENDING_PASSWORD }}
          SERVER: ${{ secrets.SERVER }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          APP_BASE_URL: https://mailist.nowscott.top
          SUBSCRIPTION_CONFIRMATION_SECRET: ${{ secrets.SUBSCRIPTION_CONFIRMATION_SECRET }}
        run: |
          python src/main.py

      - name: 生成当日发送标记
        if: always() && github.event_name == 'schedule' && steps.delivery_cache.outputs.cache-hit != 'true' && steps.send_newsletter.outcome != 'skipped'
        run: |
          printf '%s\n' "${{ steps.delivery.outputs.delivery_date }}" > .newsletter-delivery-marker

      - name: 保存当日发送标记
        if: always() && github.event_name == 'schedule' && steps.delivery_cache.outputs.cache-hit != 'true' && steps.send_newsletter.outcome != 'skipped'
        uses: actions/cache/save@v5
        with:
          path: .newsletter-delivery-marker
          key: newsletter-delivery-${{ steps.delivery.outputs.delivery_date }}
