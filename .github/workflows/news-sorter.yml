name: 新闻排序
on:
  workflow_dispatch:
  schedule:
    - cron: '30 16 * * *'  # 每天上海时间00:30执行（UTC+8转换为UTC时间16:30）

permissions:
  contents: write

concurrency:
  group: archive-writer
  cancel-in-progress: false

jobs:
  sort-news:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码库
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: 设置 Git
        run: |
          git config user.name "NowScott"
          git config user.email "nowscott@qq.com"

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: 安装 Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get -f install -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行 news_sorter.py
        run: |
          python src/news_sorter.py

      - name: 提交更改
        run: |
          git add news_archive/
          echo "添加文件后的 Git 状态:"
          git status
          git diff --cached --exit-code news_archive/ || (
            DATE=$(TZ="Asia/Shanghai" date "+%Y-%m-%d %H:%M:%S")
            echo "正在提交新闻排序更改..."
            git commit -m "新闻排序更新于 $DATE"
            git pull --rebase origin main
            git push origin main
            echo '排序更新成功'
          )
